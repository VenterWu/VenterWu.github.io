name: Deploy to GitHub Pages

on:
  # Trigger branch: change this if your default branch is not main.
  push:
    branches: [main]
  workflow_dispatch:

# Required permissions for GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Public site values: keep these aligned with src/utils/config.ts before release.
env:
  SITE_URL: https://YOUR_USERNAME.github.io
  BASE_PATH: /

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          path: .
          node-version: 20
          package-manager: npm@latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
